# ============================================================
#  PIPELINE 2 — DevSecOps
#  Sécurité intégrée à chaque étape du pipeline CI/CD
#
#  Étapes de sécurité :
#    SAST     → Semgrep    (analyse statique du code)
#    SCA      → npm audit  (vulnérabilités des dépendances)
#    Secrets  → Gitleaks   (détection de secrets dans le code)
#    Image    → Trivy      (scan de l'image Docker)
#    DAST     → OWASP ZAP  (test dynamique de l'API)
# ============================================================

name: "Pipeline 2 — DevSecOps"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 1 — SAST : Analyse Statique du Code (Semgrep)
  # Détecte les vulnérabilités directement dans le code source
  # ══════════════════════════════════════════════════════════
  sast-semgrep:
    name: "SAST — Semgrep"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installer Semgrep
        run: pip install semgrep

      - name: Exécuter le scan SAST Semgrep
        run: |
          semgrep scan \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --json \
            --output=semgrep-results.json \
            . || true
        continue-on-error: true

      - name: Afficher le résumé des résultats
        run: |
          echo "=== Résultats Semgrep ==="
          if [ -f semgrep-results.json ]; then
            python3 -c "
          import json, sys
          with open('semgrep-results.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          print(f'Vulnérabilités trouvées : {len(results)}')
          for r in results[:10]:
              print(f'  [{r[\"extra\"][\"severity\"]}] {r[\"check_id\"]} — {r[\"path\"]}:{r[\"start\"][\"line\"]}')
          " || echo "Rapport généré : semgrep-results.json"
          fi
        continue-on-error: true

      - name: Uploader le rapport SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-sast-semgrep
          path: semgrep-results.json

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 2 — SCA : Audit des Dépendances (npm audit)
  # Détecte les vulnérabilités dans les packages npm
  # ══════════════════════════════════════════════════════════
  sca-npm-audit:
    name: "SCA — npm audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Audit des dépendances Backend
        run: |
          cd Backend
          npm ci
          echo "=== npm audit Backend ==="
          npm audit --json > ../npm-audit-backend.json || true
          npm audit || true
        continue-on-error: true

      - name: Audit des dépendances Frontend
        run: |
          cd Frontend
          npm ci
          echo "=== npm audit Frontend ==="
          npm audit --json > ../npm-audit-frontend.json || true
          npm audit || true
        continue-on-error: true

      - name: Uploader les rapports SCA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-sca-npm-audit
          path: npm-audit-*.json

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 3 — Secret Scanning (Gitleaks)
  # Détecte les mots de passe, tokens, clés API dans le code
  # ══════════════════════════════════════════════════════════
  secret-scan:
    name: "Secret Scan — Gitleaks"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout complet (historique Git)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan de secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 4 — Build Docker Images
  # Exécutée APRÈS les scans statiques
  # ══════════════════════════════════════════════════════════
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-npm-audit, secret-scan]

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Build image Backend
        run: docker build -f Dockerfile.backend -t hospital-backend:${{ github.sha }} .

      - name: Build image Frontend
        run: docker build -f Dockerfile.frontend -t hospital-frontend:${{ github.sha }} .

      - name: Sauvegarder les images comme artefacts
        run: |
          docker save hospital-backend:${{ github.sha }} -o backend-image.tar
          docker save hospital-frontend:${{ github.sha }} -o frontend-image.tar

      - name: Uploader les images Docker
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: "*-image.tar"
          retention-days: 1

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 5 — Container Scan (Trivy)
  # Scan des images Docker pour vulnérabilités OS + packages
  # ══════════════════════════════════════════════════════════
  container-scan:
    name: "Container Scan — Trivy"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Télécharger les images Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Charger les images Docker
        run: |
          docker load -i backend-image.tar
          docker load -i frontend-image.tar

      - name: Scan Trivy — Image Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hospital-backend:${{ github.sha }}'
          format: 'json'
          output: 'trivy-backend.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Scan Trivy — Image Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hospital-frontend:${{ github.sha }}'
          format: 'json'
          output: 'trivy-frontend.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Uploader les rapports Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-trivy-container
          path: trivy-*.json

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 6 — DAST : Test Dynamique (OWASP ZAP)
  # Lance l'API et attaque dynamiquement les endpoints
  # ══════════════════════════════════════════════════════════
  dast-zap:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-npm-audit, secret-scan]

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances Backend
        run: npm ci
        working-directory: Backend

      - name: Démarrer le Backend pour le DAST
        run: |
          cd Backend
          node server.js &
          echo "Attente du démarrage du serveur..."
          sleep 15
          curl -s http://localhost:6005 && echo "Backend OK" || echo "Backend en cours de démarrage..."
        env:
          DB_Url: "mongodb://127.0.0.1:27017/hospital"
          PORT: "6005"
          JWT_SECRET: "test-secret-ci-only"

      - name: OWASP ZAP — Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:6005'
          cmd_options: '-I'
        continue-on-error: true

      - name: Uploader le rapport ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-dast-zap
          path: report_html.html

  # ══════════════════════════════════════════════════════════
  # ÉTAPE 7 — Push & Deploy (après tous les scans)
  # ══════════════════════════════════════════════════════════
  push-deploy:
    name: "Push & Deploy"
    runs-on: ubuntu-latest
    needs: [container-scan, dast-zap]

    steps:
      - name: Télécharger les images Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Charger les images Docker
        run: |
          docker load -i backend-image.tar
          docker load -i frontend-image.tar

      - name: Connexion à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push des images sécurisées
        run: |
          docker tag hospital-backend:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-secure-${{ github.sha }}
          docker tag hospital-backend:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-secure-latest
          docker tag hospital-frontend:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-secure-${{ github.sha }}
          docker tag hospital-frontend:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-secure-latest

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-secure-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-secure-latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-secure-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-secure-latest

      - name: Déploiement
        run: |
          echo "=================================================="
          echo "  DÉPLOIEMENT — Pipeline DevSecOps"
          echo "=================================================="
          echo ""
          echo "  Scans effectués :"
          echo "    ✅  SAST      — Semgrep    (code source)"
          echo "    ✅  SCA       — npm audit  (dépendances)"
          echo "    ✅  Secrets   — Gitleaks   (credentials)"
          echo "    ✅  Container — Trivy      (image Docker)"
          echo "    ✅  DAST      — OWASP ZAP  (API dynamique)"
          echo ""
          echo "  Image Backend  : backend-secure-latest → DÉPLOYÉ ✅"
          echo "  Image Frontend : frontend-secure-latest → DÉPLOYÉ ✅"
          echo "=================================================="
