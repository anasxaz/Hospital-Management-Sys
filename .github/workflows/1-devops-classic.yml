# ============================================================
#  PIPELINE 1 — DevOps Classique
#  Sans aucune sécurité intégrée (Build → Test → Deploy)
#  Utilisé comme référence pour la comparaison DevSecOps
# ============================================================

name: "Pipeline 1 — DevOps Classique"

on:
  push:
    branches: [main]
  workflow_dispatch:   # Déclenchement manuel depuis GitHub UI

jobs:

  # ──────────────────────────────────────────────
  # JOB 1 : Installation des dépendances + Build
  # ──────────────────────────────────────────────
  build:
    name: "Build & Install"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances Backend
        run: npm ci
        working-directory: Backend

      - name: Installer les dépendances Frontend
        run: npm ci
        working-directory: Frontend

      - name: Build du Frontend (Vite)
        run: npm run build
        working-directory: Frontend

      - name: Uploader le build Frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Frontend/dist/

  # ──────────────────────────────────────────────
  # JOB 2 : Build Docker + Push sur DockerHub
  # ──────────────────────────────────────────────
  docker-build-push:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Connexion à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-classic-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-classic-latest

      - name: Build & Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-classic-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-classic-latest

  # ──────────────────────────────────────────────
  # JOB 3 : Déploiement (simulation)
  # ──────────────────────────────────────────────
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Déploiement de l'application
        run: |
          echo "================================================"
          echo "  DÉPLOIEMENT — Pipeline DevOps Classique"
          echo "================================================"
          echo ""
          echo "  Image Backend  : ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:backend-classic-latest"
          echo "  Image Frontend : ${{ secrets.DOCKERHUB_USERNAME }}/hospital-management:frontend-classic-latest"
          echo ""
          echo "  ⚠️  Aucun scan de sécurité n'a été effectué."
          echo "  ⚠️  Vulnérabilités potentielles non détectées."
          echo ""
          echo "  ✅  Déploiement terminé."
          echo "================================================"
